name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1, v1.0.0
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to create or update
        required: true
        default: v2.0.1

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_name: px-linux-x64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            package_name: px-macos-arm64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_name: px-windows-x64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/package
          cp target/${{ matrix.target }}/release/px dist/package/px
          chmod +x dist/package/px
          cp README.md RELEASE_NOTES.md dist/package/
          tar -czf dist/${{ matrix.package_name }} -C dist/package .

      - name: Prepare Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\package | Out-Null
          Copy-Item target\${{ matrix.target }}\release\px.exe dist\package\px.exe
          Copy-Item README.md, RELEASE_NOTES.md dist\package\
          Compress-Archive -Path dist\package\* -DestinationPath dist\${{ matrix.package_name }} -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_name }}
          path: dist/${{ matrix.package_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify release assets
        run: |
          ls -lah artifacts
          test -f artifacts/px-linux-x64.tar.gz
          test -f artifacts/px-macos-arm64.tar.gz
          test -f artifacts/px-windows-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: artifacts/*
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
